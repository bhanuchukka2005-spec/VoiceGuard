name: VoiceGuard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linters
        run: pip install flake8 flake8-bugbear

      - name: Run flake8
        run: |
          flake8 api/ model/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,B008 \
            --exclude=__pycache__
        # B008 is ignored because FastAPI intentionally uses File(...) and
        # Query(...) as function-default sentinels — this is documented
        # FastAPI behaviour, not a bug.

  # ── 2. Python tests ──────────────────────────────────────────────────────────
  test:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1 ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Train model in synthetic mode
        run: python model/train.py

      - name: Run API tests
        run: pytest tests/ -v --tb=short

  # ── 3. Docker build + smoke test ─────────────────────────────────────────────
  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest
    needs: [test, lint]
    # Only on pushes to main — saves CI minutes on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t voiceguard:${{ github.sha }} .

      - name: Start container
        run: |
          docker run -d \
            --name vg_smoke \
            -p 8000:8000 \
            voiceguard:${{ github.sha }}

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Server ready after ${i}x2s"
              break
            fi
            sleep 2
          done

      - name: Health check
        run: |
          STATUS=$(curl -sf http://localhost:8000/health \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])")
          echo "Server status: $STATUS"
          if [ "$STATUS" != "ok" ]; then
            echo "Health check failed"
            exit 1
          fi

      - name: Model info check
        run: curl -sf http://localhost:8000/model/info | python3 -m json.tool

      - name: Teardown
        if: always()
        run: docker stop vg_smoke && docker rm vg_smoke

  # ── 4. Optional publish (tagged releases only) ───────────────────────────────
